name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.1.1'

      - name: Build APK
        run: gradle assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p output
          find app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} output/PenerimaanSDJ-v${{ github.run_number }}.apk \;
          ls -la output/

      - uses: actions/upload-artifact@v4
        with:
          name: PenerimaanSDJ-APK-v${{ github.run_number }}
          path: output/PenerimaanSDJ-v${{ github.run_number }}.apk
          retention-days: 90
